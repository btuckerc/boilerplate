ui:
  btop:
    color_theme:
      linux: "current"
      darwin: "/opt/homebrew/opt/btop/share/btop/themes/adapta.theme"
      windows: "Default"
  terminals:
    defaults:
      linux: "kitty"
      darwin: "ghostty"
      windows: ""
    linux:
      launcher: "xdg-terminal-exec"
      options:
        - name: "kitty"
          package: "kitty"
          desktop_id: "kitty.desktop"
        - name: "alacritty"
          package: "alacritty"
          desktop_id: "Alacritty.desktop"
          copy_desktop_entry_from_omarchy: true
        - name: "ghostty"
          package: "ghostty"
          desktop_id: "com.mitchellh.ghostty.desktop"
        - name: "foot"
          package: "foot"
          desktop_id: "foot.desktop"
  ghostty:
    profiles:
      linux:
        - "# Dynamic theme colors"
        - "config-file = ?\"~/.config/omarchy/current/theme/ghostty.conf\""
        - ""
        - "# Font"
        - "font-family = \"JetBrainsMono Nerd Font\""
        - "font-style = Regular"
        - "font-size = 9"
        - ""
        - "# Window"
        - "window-theme = ghostty"
        - "window-padding-x = 14"
        - "window-padding-y = 14"
        - "confirm-close-surface=false"
        - "resize-overlay = never"
        - "gtk-toolbar-style = flat"
        - ""
        - "# Cursor styling"
        - "cursor-style = \"block\""
        - "cursor-style-blink = false"
        - ""
        - "# Cursor styling + SSH session terminfo"
        - "# (all shell integration options must be passed together)"
        - "shell-integration-features = no-cursor,ssh-env"
        - ""
        - "# Keyboard bindings"
        - "keybind = shift+insert=paste_from_clipboard"
        - "keybind = control+insert=copy_to_clipboard"
        - "keybind = super+control+shift+alt+arrow_down=resize_split:down,100"
        - "keybind = super+control+shift+alt+arrow_up=resize_split:up,100"
        - "keybind = super+control+shift+alt+arrow_left=resize_split:left,100"
        - "keybind = super+control+shift+alt+arrow_right=resize_split:right,100"
        - ""
        - "# Slowdown mouse scrolling"
        - "mouse-scroll-multiplier = 0.95"
        - ""
        - "# Fix general slowness on hyprland"
        - "async-backend = epoll"
      darwin:
        - "background-opacity=0.8"
        - "font-size=24"
        - "adjust-cell-height=35%"
        - "theme=current-theme"
        - "font-family = \"\""
        - "font-family = \"SF Mono\""
        - "background-blur-radius=40"
        - "window-padding-y=0"
        - "window-padding-x=5"
        - "window-padding-balance=true"
        - "window-height=24"
        - "window-width=80"
        - "confirm-close-surface=false"
        - "macos-window-shadow=false"
        - "macos-titlebar-style=hidden"
        - "macos-icon=custom-style"
        - "macos-icon-frame=plastic"
        - "macos-option-as-alt=true"
        - "keybind = super+r=reload_config"
        - "keybind = super+i=inspector:toggle"
        - "macos-non-native-fullscreen = true"
        - "title = \" \""
      windows: []
  kitty:
    profiles:
      linux:
        - "include ~/.config/omarchy/current/theme/kitty.conf"
        - ""
        - "# Font"
        - "font_family JetBrainsMono Nerd Font"
        - "bold_italic_font auto"
        - "font_size        9.0"
        - ""
        - "# Window"
        - "window_padding_width 14"
        - "hide_window_decorations yes"
        - "confirm_os_window_close 0"
        - ""
        - "# Keybindings"
        - "map ctrl+insert copy_to_clipboard"
        - "map shift+insert paste_from_clipboard"
        - ""
        - "# Allow remote access"
        - "allow_remote_control yes"
        - ""
        - "# Aesthetics"
        - "cursor_shape block"
        - "cursor_blink_interval 0"
        - "shell_integration no-cursor"
        - "enable_audio_bell no"
        - ""
        - "# Minimal Tab bar styling"
        - "tab_bar_edge                bottom"
        - "tab_bar_style               powerline"
        - "tab_powerline_style         slanted"
        - "tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}"
      darwin:
        - "# Shell configuration"
        - "shell /bin/zsh --login --interactive"
        - "term xterm-kitty"
        - ""
        - "# Window title"
        - "wayland_titlebar_color system"
        - "macos_titlebar_color system"
        - "macos_show_window_title_in none"
        - "hide_window_decorations titlebar-only"
        - ""
        - "# Allow running kitty command from nvim (https://github.com/kovidgoyal/kitty/issues/2426)"
        - "allow_remote_control yes"
        - "listen_on unix:/tmp/mykitty"
        - ""
        - "# Environment variables for shell and tmux compatibility"
        - "env TERM_PROGRAM=kitty"
        - "env SHELL=/bin/zsh"
        - "env ZDOTDIR=$HOME"
        - "env STARSHIP_SHELL=zsh"
        - "env STARSHIP_CONFIG=$HOME/.config/starship.toml"
        - ""
        - "# BEGIN_KITTY_THEME"
        - "# Adwaita dark"
        - "include current-theme.conf"
        - "# END_KITTY_THEME"
        - ""
        - "editor \"/opt/homebrew/bin/nvim\""
        - ""
        - "# Font configuration"
        - "font_size 18.0"
        - "modify_font cell_width 95%"
        - "disable_ligatures never"
        - ""
        - "# Terminal appearance"
        - "tab_bar_style powerline"
        - "tab_powerline_style slanted"
        - "cursor #ffffff"
        - "cursor_text_color #000000"
        - "cursor_shape beam"
        - "cursor_beam_thickness 1.5"
        - "cursor_blink 0"
        - "cursor_blink_interval 0"
        - ""
        - "# Window settings"
        - "hide_window_decorations titlebar-only"
        - ""
        - "#: top right bottom left"
        - "window_padding_width 0 5 0 5"
        - "window_margin_width 5"
        - "confirm_os_window_close 0"
        - ""
        - "# Scrollback and performance"
        - "scrollback_lines 10000"
        - "scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER"
        - "text_composition_strategy 1.7 30"
        - ""
        - "# URL handling"
        - "url_style curly"
        - "detect_urls yes"
        - "open_url_with default"
        - "copy_on_select yes"
        - ""
        - "# Mouse settings"
        - "mouse_hide_wait 2.0"
        - "focus_follows_mouse yes"
        - ""
        - "# Bell settings"
        - "enable_audio_bell no"
        - "visual_bell_duration 0.0"
        - "window_alert_on_bell yes"
        - ""
        - "# Background effects"
        - "background_opacity 0.9"
        - "background_blur 18"
        - ""
        - "# BEGIN_KITTY_FONTS"
        - "font_family      family='MesloLGL Nerd Font Mono' postscript_name=MesloLGLNFM-Regular"
        - "bold_font        auto"
        - "italic_font      auto"
        - "bold_italic_font auto"
        - "# END_KITTY_FONTS"
        - ""
        - "# Keyboard shortcuts"
        - "map ctrl+shift+c copy_to_clipboard"
        - "map ctrl+shift+v paste_from_clipboard"
        - "map ctrl+shift+plus change_font_size all +2.0"
        - "map ctrl+shift+minus change_font_size all -2.0"
        - ""
        - "# Tab management"
        - "map ctrl+shift+t new_tab"
        - "map ctrl+shift+w close_tab"
        - "map ctrl+shift+right next_tab"
        - "map ctrl+shift+left previous_tab"
        - "map ctrl+shift+l next_layout"
        - ""
        - "# Window management"
        - "map ctrl+shift+enter new_window"
        - "map ctrl+shift+n new_os_window"
        - "map ctrl+shift+] next_window"
        - "map ctrl+shift+[ previous_window"
        - ""
        - "# Shell integration"
        - "shell_integration enabled"
      windows: []
