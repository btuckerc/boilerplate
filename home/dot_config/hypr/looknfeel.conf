# Change the default Omarchy look'n'feel

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 4
    gaps_out = 8

    # Change to niri-like side-scrolling layout
    # layout = scrolling
}

# Remove gaps and border when a workspace has a single tiled window.
workspace = w[t1] s[false], gapsout:0, gapsin:0, bordersize:0, rounding:false
workspace = w[tg1] s[false], gapsout:0, gapsin:0, bordersize:0, rounding:false
workspace = f[1] s[false], gapsout:0, gapsin:0, bordersize:0, rounding:false

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = no
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

misc {
    vfr = true
}

render {
    direct_scanout = 1
}

windowrule = opacity 1.0 1.0, match:tag default-opacity
