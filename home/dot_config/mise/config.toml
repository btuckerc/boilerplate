[tools]
# Core dependencies - must install first
python = "3.13.13"
uv = "0.11.5"
bun = "1.3.11"
node = "24.14.1"
go = "1.25.9"

# Pin core operational CLIs so machines stay aligned.
"npm:@openai/codex" = "0.121.0"

# CLI tools (fast binary downloads)
"ubi:twpayne/chezmoi" = "2.66.0"
"ubi:starship/starship" = "1.24.2"
"ubi:ajeetdsouza/zoxide" = "0.9.9"
"ubi:junegunn/fzf" = "0.71.0"
"ubi:sharkdp/bat" = "0.26.1"
"ubi:sharkdp/fd" = "10.4.2"
"ubi:sxyazi/yazi" = "26.1.22"
"ubi:jqlang/jq" = "jq-1.8.1"
"ubi:charmbracelet/gum" = "0.17.0"
"ubi:jesseduffield/lazygit" = "0.61.0"
"ubi:tree-sitter/tree-sitter" = "0.26.8"
"ubi:carapace-sh/carapace-bin" = { version = "1.6.4", exe = "carapace" }
"npm:@bitwarden/cli" = "2026.3.0"
"aqua:restic/restic" = "0.18.1"

# Editor and dev tools
"github:neovim/neovim" = "0.12.1"
"github:cli/cli" = "2.89.0"
"github:BurntSushi/ripgrep" = "15.1.0"
"asdf:mise-plugins/mise-tmux" = "3.6a"

# Language servers (require node/python/go)
"npm:typescript-language-server" = "5.1.3"
"npm:typescript" = "6.0.2"
"npm:pyright" = "1.1.408"
"npm:yaml-language-server" = "1.21.0"
"npm:vscode-langservers-extracted" = "4.10.0"
"npm:bash-language-server" = "5.6.0"
"npm:dockerfile-language-server-nodejs" = "0.15.0"
"npm:prettier" = "3.8.1"
"npm:@playwright/mcp" = "0.0.70"

"go:golang.org/x/tools/gopls" = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"

"pipx:black" = "26.3.1"
"pipx:yubikey-manager" = "5.9.0"

"github:LuaLS/lua-language-server" = "3.17.1"
"github:rust-lang/rust-analyzer" = "2026-03-30"
"github:hashicorp/terraform-ls" = "0.38.0"
"github:JohnnyMorganz/StyLua" = "2.1.0"
"go:mvdan.cc/gofumpt" = "latest"
"go:mvdan.cc/sh/v3/cmd/shfmt" = "latest"

# Ruby tools (install last due to build complexity)
ruby = "3.4.9"
"gem:solargraph" = "0.59.0.dev.2"
"gem:rails" = "8.1.3"

[settings]
experimental = true
legacy_version_file = true
always_keep_download = false
plugin_autoupdate_last_check_duration = "7d"
jobs = 2
verbose = false
asdf_compat = true
color = true
task_output = "prefix"
http_timeout = "120"
raw = false

[hooks]
preinstall = "bash ${XDG_CONFIG_HOME:-$HOME/.config}/mise/hooks/preinstall"

[env]
# Fix Ruby build requiring 'python' command
_.path = [
  "{{ config_root }}/shims",
  "~/.local/share/mise/shims",
]

[env._.python]
# Ensure python command exists for tools that need it


[settings.pipx]
uvx = true

[settings.npm]
bun = true
